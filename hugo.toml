url = "https://github.com/abhishek-sankar"

[[params.social]]
name = "Chemistry SE"
url = "https://chemistry.stackexchange.com/users/42352/subzero"

# Main menu pages
[[params.menu]]
name = "home"
url = "/"

[[params.menu]]
name = "posts"
url = "/posts"

[[params.menu]]
name = "about"
url = "/about"

[[params.menu]]
